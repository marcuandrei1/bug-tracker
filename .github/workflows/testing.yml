name: Testare

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
    backend-tests:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: 25
            distribution: temurin
            cache: maven
        - name: Run Spring Boot Tests
          working-directory: ./BugReporter-backend
          run: mvn test
        
    cypress-tests:
        needs: backend-tests
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 25
          uses: actions/setup-java@v4
          with:
            java-version: 25
            distribution: temurin
        - name: Start Spring Boot Application
          working-directory: ./BugReporter-backend
          run: mvn spring-boot:run &

        - name: Run Cypress
          uses: cypress-io/github-action@v6
          with:
            working-directory: ./BugReporter-frontend
            start: npm start
            wait-on: 'http://localhost:5173'
            browser: edge