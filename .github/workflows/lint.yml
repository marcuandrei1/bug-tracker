name: Lint & Code Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checkstyle:
    name: Java Checkstyle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        working-directory: BugReporter-backend
        run: mvn checkstyle:check

  eslint:
    name: React ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BugReporter-frontend/package-lock.json

      - name: Install dependencies
        working-directory: BugReporter-frontend
        run: npm install

      - name: Run ESLint
        working-directory: BugReporter-frontend
        run: npm run lint
